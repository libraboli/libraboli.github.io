<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:image" content="{{ site.url }}/assets/img/bo-li.jpeg">
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <div class="page-shell">
      {% include nav.html %}
      <main>
        {{ content }}
      </main>
      <footer class="site-footer">
        <p>© {{ 'now' | date: '%Y' }} Bo Li. Built for research, service, and industrial AI imaging work.</p>
        <div class="footer-links">
          <a href="{{ site.social.google_scholar }}">Google Scholar</a>
          <a href="{{ site.social.openreview }}">OpenReview</a>
          <a href="{{ site.social.github }}">vivo Camera Research</a>
          <a href="{{ site.social.x }}">X</a>
        </div>
      </footer>
    </div>
  </body>
</html>
