---
layout: default
---

<section class="page-heading">
  <p class="eyebrow">{{ page.kicker | default: "Bo Li" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.description %}
    <p class="page-description">{{ page.description }}</p>
  {% endif %}
</section>

<article class="content-page">
  {{ content }}
</article>
